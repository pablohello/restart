[basic]
; Путь к папке, где лежат ваши папки с результатами расчетов (raw data)
raw_dir = /work1/spavlov/deepH/work/batch_calc/

; Путь, куда скрипт сохранит обработанные данные
processed_dir = /work1/spavlov/deepH/work/batch_calc/prep/
; Ваш интерфейс. Варианты из кода: openmx, abacus, siesta, aims
interface = aims 

; Что извлекать. Варианты: hamiltonian, density_matrix
target = hamiltonian

; Нужно ли сохранять матрицу перекрывания (обычно да для DeepH)
get_S = true

; Использовать ли локальные координаты (обычно true для DeepH)
local_coordinate = true

; Количество процессов (0 = последовательно, >0 = параллельно)
multiprocessing = 30

[interpreter]
; Путь к исполняемому файлу Julia (обязательно нужен для работы скрипта)
julia_interpreter = /work1/spavlov/deepH/julia-1.6.6/bin/julia/

[graph]
; Радиус обрезки для графа (стандартное значение около 10-12, зависит от системы)
radius = 12.0
; Создавать граф из DFT (обычно true)
create_from_DFT = true
; Случайный поворот (обычно false для процессинга)
r2_rand = false

[magnetic_moment]
; Если нужна обработка магнетизма (поставьте false, если не уверены)
parse_magnetic_moment = false
magnetic_element = []

